name = "noracx-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# CORS allowlist — agregar/quitar orígenes según hosts del frontend.
# localhost:4321 sirve para `pnpm --filter @noracx/web dev` contra esta API.
[vars]
CORS_ALLOWED_ORIGINS = "https://noracx.com,https://www.noracx.com,https://admin.noracx.com,http://localhost:4321,http://localhost:5173"
# Email From — noracx.com está verificado en Resend (DKIM/SPF/return-path).
EMAIL_FROM = "NORAC X <hola@noracx.com>"
# DEPLOY_HOOK_URL se carga via wrangler secret put. URL es del tipo
# https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/<hash>
# Generada desde Pages → noracx-web → Settings → Deploy Hooks.
DEPLOY_HOOK_URL = ""

# D1 binding.
# Completar database_id después de correr `wrangler d1 create noracx-db`.
[[d1_databases]]
binding = "DB"
database_name = "noracx-db"
database_id = "09251a32-3ce6-4b45-be02-bf94f69f13dd"
migrations_dir = "drizzle/migrations"

# Observabilidad por defecto en Workers
[observability]
enabled = true

# Workers Route — el worker maneja todo lo que llegue a noracx.com/api/*.
# El resto del dominio sigue sirviéndolo Cloudflare Pages (apps/web).
# Workers Routes tienen prioridad sobre Pages para esos paths específicos.
[[routes]]
pattern = "noracx.com/api/*"
zone_name = "noracx.com"

[[routes]]
pattern = "www.noracx.com/api/*"
zone_name = "noracx.com"

# admin.noracx.com sirve el SPA de admin desde Cloudflare Pages (proyecto
# noracx-admin), pero /api/* lo intercepta este worker — mismo origen
# evita la complicación de cookies cross-subdomain en el login.
[[routes]]
pattern = "admin.noracx.com/api/*"
zone_name = "noracx.com"

# Cron triggers
# Spotify snapshot disabled — los cambios de Feb 2026 quitaron followers,
# popularity y genres del response de /artists/{id} para apps en Development
# Mode. El código de lib/spotify.ts y la tabla spotify_snapshots quedan
# por si Spotify revierte o decidimos reactivar para sincronizar imágenes
# u otros campos disponibles.
# [triggers]
# crons = ["0 9 * * *"]
